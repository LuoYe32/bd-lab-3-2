name: CD

on:
  workflow_dispatch: {}
  schedule:
    - cron: "0 6 * * 1"

jobs:
  deploy-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required secrets
        run: |
          if [ -z "${{ secrets.QDRANT_API_KEY }}" ]; then
            echo "QDRANT_API_KEY is missing"
            exit 1
          fi

          if [ -z "${{ secrets.DOCKERHUB_USERNAME }}" ]; then
            echo "DOCKERHUB_USERNAME is missing"
            exit 1
          fi

          if [ -z "${{ secrets.DOCKERHUB_TOKEN }}" ]; then
            echo "DOCKERHUB_TOKEN is missing"
            exit 1
          fi

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Pull image
        run: |
          IMAGE="${{ secrets.DOCKERHUB_USERNAME }}/bd-lab-3-2:latest"
          docker pull "$IMAGE"

      - name: Start Qdrant
        run: |
          docker network create app-net || true

          docker run -d \
            --network app-net \
            -p ${{ secrets.QDRANT_PORT }}:${{ secrets.QDRANT_PORT }} \
            -e QDRANT__SERVICE__API_KEY=${{ secrets.QDRANT_API_KEY }} \
            --name qdrant \
            qdrant/qdrant

      - name: Wait for Qdrant
        run: |
          for i in {1..30}; do
            if curl -sf \
              -H "api-key: ${{ secrets.QDRANT_API_KEY }}" \
              http://localhost:6333 > /dev/null; then
              echo "Qdrant is ready"
              exit 0
            fi
            echo "Waiting for Qdrant..."
            sleep 2
          done
          echo "Qdrant failed to start"
          docker logs qdrant || true
          exit 1

      - name: Run API container
        run: |
          IMAGE="${{ secrets.DOCKERHUB_USERNAME }}/bd-lab-3-2:latest"
          docker run -d \
            --network app-net \
            --name fashion_api \
            -p 8000:8000 \
            -e QDRANT_HOST=qdrant \
            -e QDRANT_PORT=6333 \
            -e QDRANT_API_KEY=${{ secrets.QDRANT_API_KEY }} \
            -e DAGSHUB_ACCESS_KEY=${{ secrets.DAGSHUB_ACCESS_KEY }} \
            -e DAGSHUB_SECRET_KEY=${{ secrets.DAGSHUB_SECRET_KEY }} \
            "$IMAGE"

      - name: Show running containers
        run: docker ps -a

      - name: Wait for API ready
        run: |
          for i in {1..30}; do
            if curl -s http://localhost:8000/health | grep -q "ok"; then
              echo "API is ready"
              exit 0
            fi
            sleep 2
          done
          echo "API not ready"
          docker logs fashion_api
          exit 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install httpx
        run: |
          python -m pip install --upgrade pip
          pip install httpx

      - name: Run functional scenario
        run: |
          python tools/run_scenario.py scenario.json

      - name: Logs on failure
        if: failure()
        run: docker logs fashion_api || true

      - name: Stop containers
        if: always()
        run: |
          docker stop fashion_api || true
          docker stop qdrant || true